name: 02-pr-security

on:
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: docker build -t myapp:pr .

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:pr
          severity: CRITICAL,HIGH
          exit-code: 1
